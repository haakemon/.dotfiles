networks:
  default:
    driver: bridge

services:
  grimmory:
    image: ghcr.io/grimmory-tools/grimmory:v3.2.2@sha256:c3fc5ed1d30e33fb6c276dfbb438d29eb7b8f082a6b0c8a66d285564ee758246
    container_name: grimmory
    environment:
      - USER_ID=${APP_USER_ID}
      - GROUP_ID=${APP_GROUP_ID}
      - TZ=${TZ}
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_USERNAME=${DB_USER}
      - DATABASE_PASSWORD=${DB_PASSWORD}
      - BOOKLORE_PORT=${BOOKLORE_PORT}
    depends_on:
      grimmory-mariadb:
        condition: service_healthy
    ports:
      - '${BOOKLORE_PORT}:${BOOKLORE_PORT}'
    volumes:
      - $DATADIR/booklore/data:/app/data
      - $DATADIR/booklore/books:/books
      - $DATADIR/booklore/bookdrop:/bookdrop
    restart: unless-stopped

  grimmory-mariadb:
    image: lscr.io/linuxserver/mariadb:11.4.12@sha256:4fd30d278d9c85158706679451dac3d48aeec9c447fc0135d8c75b3c938b61e7
    container_name: grimmory-mariadb
    environment:
      - PUID=${DB_USER_ID}
      - PGID=${DB_GROUP_ID}
      - TZ=${TZ}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - $DATADIR/booklore/mariadb/config:/config
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'mariadb-admin', 'ping', '-h', 'localhost']
      interval: 5s
      timeout: 5s
      retries: 10
