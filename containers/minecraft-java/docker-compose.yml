networks:
  default:
    driver: bridge

services:
  mc:
    image: itzg/minecraft-server:2026.6.1@sha256:2a3ed0997720d79b7ed783a79e43143358b2e60d27daf15c2b1d27b59d04a6d8
    environment:
      TZ: $TZ
      TIME_ZONE: $TZ
      EULA: 'true'
      TYPE: 'PAPER'
      PLUGINS: |
        https://download.geysermc.org/v2/projects/geyser/versions/latest/builds/latest/downloads/spigot
        https://download.geysermc.org/v2/projects/floodgate/versions/latest/builds/latest/downloads/spigot
    ports:
      - '25565:25565'
      - '19133:19132/udp'
    volumes:
      - '$DATADIR/minecraft-java/data:/data'
