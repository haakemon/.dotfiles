networks:
  default:
    driver: bridge

services:
  mc:
    image: itzg/minecraft-server@sha256:7fb066de722ad1b8dd05bb1681d68f7c89833c82990026ac084b515014b0aaa8
    environment:
      TZ: $TZ
      TIME_ZONE: $TZ
      EULA: 'true'
      TYPE: 'PAPER'
      PLUGINS: |
        https://download.geysermc.org/v2/projects/geyser/versions/latest/builds/latest/downloads/spigot
        https://download.geysermc.org/v2/projects/floodgate/versions/latest/builds/latest/downloads/spigot
    ports:
      - '25565:25565'
      - '19133:19132/udp'
    volumes:
      - '$DATADIR/minecraft-java/data:/data'
