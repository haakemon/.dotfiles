networks:
  default:
    driver: bridge

########################### SERVICES
services:
  valheim:
    image: lloesche/valheim-server@sha256:b0a69a47cab987c7583cbaa4eea5bc54a17f2e9c82999c2c8e53454d7fd073b1
    container_name: valheim
    cap_add:
      - sys_nice
    volumes:
      - $DATADIR/valheim/config:/config
      - $DATADIR/valheim/data:/opt/valheim
    ports:
      - '2456:2456/udp'
    environment:
      TZ: $TZ
      TIME_ZONE: $TZ
      SERVER_NAME: $VALHEIM_SERVER_NAME
      WORLD_NAME: $VALHEIM_WORLD_NAME
      SERVER_PASS: $VALHEIM_SERVER_PASS
      SERVER_PUBLIC: false
    stop_grace_period: 2m
