networks:
  default:
    driver: bridge

########################### SERVICES
services:
  valheim:
    image: lloesche/valheim-server@sha256:20fde516ce311e6084f82f295c9eb6934af57b357c657937a04f62bdf5946149
    container_name: valheim
    cap_add:
      - sys_nice
    volumes:
      - $DATADIR/valheim/config:/config
      - $DATADIR/valheim/data:/opt/valheim
    ports:
      - '2456:2456/udp'
    environment:
      TZ: $TZ
      TIME_ZONE: $TZ
      SERVER_NAME: $VALHEIM_SERVER_NAME
      WORLD_NAME: $VALHEIM_WORLD_NAME
      SERVER_PASS: $VALHEIM_SERVER_PASS
      SERVER_PUBLIC: false
    stop_grace_period: 2m
